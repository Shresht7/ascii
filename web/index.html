<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A complete ASCII reference table with decimal, hexadecimal, octal, and binary representations for every character from 0 to 127. Includes search and copy-to-clipboard.">
    <meta name="theme-color" content="#f9f9fc" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#555869" media="(prefers-color-scheme: dark)">
    <meta property="og:title" content="ASCII Table">
    <meta property="og:description"
        content="Look up any ASCII character — decimal, hex, octal, and binary at a glance.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://shresht7.github.io/ascii/">
    <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
    <title>ASCII TABLE</title>
</head>

<body>
    <header>
        <h1>ASCII TABLE</h1>
        <label for="search-input" class="visually-hidden">Search for a character or code</label>
        <input id="search-input" type="text" autocomplete="off"
            placeholder="Search for a character, code, or string (e.g. S, 65, 0x41, 0b1100, hello...)">
        <p id="search-hint">Press <kbd>/</kbd> to search · <kbd>Esc</kbd> to clear</p>
        <hr />
    </header>

    <main>
        <div id="converter-output" class="hidden"></div>
        <table id="ascii-table">
            <thead>
                <tr>
                    <th>Character</th>
                    <th>Decimal</th>
                    <th>Hexadecimal</th>
                    <th>Octal</th>
                    <th>Binary</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
        <p id="no-results-message" class="hidden"></p>
    </main>
    <footer>
        <p><a href="https://github.com/Shresht7/ascii">Shresht7/ascii</a> · ASCII Reference Table</p>
    </footer>
</body>

</html>
